<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Pro Full</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#2a0000,#7a0000);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:25px;
  background:#3a0000;
}

h1{
  color:gold;
  margin:0;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:rgba(0,0,0,0.3);
  border-radius:12px;
  overflow:hidden;
  padding:10px;
}

img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

h3{
  color:gold;
}

.price{
  font-weight:bold;
  color:#ffd700;
}

/* BOTONES */
button{
  background:gold;
  border:0;
  padding:10px;
  width:100%;
  margin-top:5px;
  cursor:pointer;
  font-weight:bold;
}

/* ADMIN BUTTON */
#adminBtn{
  position:fixed;
  bottom:15px;
  left:15px;
  background:gold;
  border:none;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
}

/* PANEL ADMIN */
#adminPanel{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#111;
  padding:20px;
  overflow:auto;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}

.adminCard{
  background:#222;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>🌹 Tienda Pro Full</h1>
<p>Compra directo por WhatsApp o pago 💳</p>
</header>

<div class="grid" id="grid"></div>

<!-- BOTÓN ADMIN -->
<button id="adminBtn" onclick="openAdmin()">⚙️</button>

<!-- PANEL ADMIN -->
<div id="adminPanel">

<h2>🔐 Admin Login</h2>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<hr>

<h2>➕ Agregar producto</h2>

<input id="name" placeholder="Nombre producto">
<input id="price" placeholder="Precio">
<input id="img" placeholder="URL imagen">
<input id="desc" placeholder="Descripción">

<button onclick="addProduct()">Agregar</button>

<hr>

<div id="list"></div>

<button onclick="closeAdmin()">Cerrar</button>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

let isAdmin = false;

/* TIENDA */
function render(){
  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  products.forEach((p,i)=>{
    grid.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <div class="price">$${p.price}</div>

        <a href="https://wa.me/56920521986?text=Quiero%20${p.name}">
          <button>WhatsApp 💬</button>
        </a>

        <button onclick="pay(${p.price})">Pagar 💳</button>
      </div>
    `;
  });

  localStorage.setItem("products", JSON.stringify(products));
}

/* 💳 PAY (placeholder WebPay) */
function pay(amount){
  alert("💳 Aquí luego conectamos WebPay real\nMonto: $" + amount);
}

/* 🔐 ADMIN */
function openAdmin(){
  document.getElementById("adminPanel").style.display="block";
  renderAdmin();
}

function closeAdmin(){
  document.getElementById("adminPanel").style.display="none";
}

/* LOGIN SIMPLE */
function login(){
  if(user.value === "admin" && pass.value === "1234"){
    isAdmin = true;
    alert("🔥 Bienvenido Admin");
    renderAdmin();
  } else {
    alert("❌ Login incorrecto");
  }
}

/* ➕ AGREGAR */
function addProduct(){

  if(!isAdmin){
    alert("No eres admin 😈");
    return;
  }

  products.push({
    name:name.value,
    price:price.value,
    img:img.value,
    desc:desc.value
  });

  name.value="";
  price.value="";
  img.value="";
  desc.value="";

  render();
  renderAdmin();
}

/* 🗑️ BORRAR */
function del(i){
  if(!isAdmin) return;

  products.splice(i,1);
  render();
  renderAdmin();
}

/* PANEL LISTA */
function renderAdmin(){
  let list=document.getElementById("list");
  list.innerHTML="";

  products.forEach((p,i)=>{
    list.innerHTML+=`
      <div class="adminCard">
        <b>${p.name}</b><br>
        $${p.price}<br><br>
        <button onclick="del(${i})">Eliminar</button>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
