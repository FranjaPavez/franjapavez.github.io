<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Florería Lirios de Oro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#2a0000,#7a0000);
  color:white;
}

header{
  text-align:center;
  padding:25px;
  background:#3a0000;
}

h1{color:gold;margin:0}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:rgba(0,0,0,0.3);
  border-radius:12px;
  padding:10px;
}

img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

.price{color:gold;font-weight:bold}

button{
  background:gold;
  border:0;
  padding:10px;
  width:100%;
  margin-top:5px;
  cursor:pointer;
}

/* ADMIN */
#adminBtn{
  position:fixed;
  bottom:15px;
  left:15px;
  padding:15px;
  border-radius:50%;
}

#adminPanel{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#111;
  padding:20px;
  overflow:auto;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.adminCard{
  background:#222;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<header>
<h1>🌹 Florería Lirios de Oro</h1>
<p>Entrega rápida en Santiago 💐</p>
</header>

<div class="grid" id="grid"></div>

<button id="adminBtn" onclick="openAdmin()">⚙️</button>

<div id="adminPanel">

<h2>🔐 Login</h2>
<input id="user" placeholder="Usuario">
<input id="pass" placeholder="Contraseña">
<button onclick="login()">Entrar</button>

<hr>

<h2>➕ Agregar producto</h2>
<input id="name" placeholder="Nombre">
<input id="price" placeholder="Precio">
<input id="img" placeholder="URL imagen">
<input id="desc" placeholder="Descripción">
<button onclick="add()">Agregar</button>

<hr>

<div id="list"></div>

<button onclick="closeAdmin()">Cerrar</button>

</div>

<script>

/* 🔥 PRODUCTOS BASE (SE VEN SIEMPRE) */
let baseProducts = [
  {
    name:"Arreglo Elegante",
    price:"30000",
    img:"https://via.placeholder.com/300",
    desc:"Perfecto para regalar 💐"
  },
  {
    name:"Corona Floral",
    price:"45000",
    img:"https://via.placeholder.com/300",
    desc:"Ideal para condolencias"
  }
];

/* 💾 PRODUCTOS EDITADOS */
let saved = JSON.parse(localStorage.getItem("products"));

let products = saved || baseProducts;

let isAdmin = false;

/* TIENDA */
function render(){
  let grid = document.getElementById("grid");
  grid.innerHTML="";

  products.forEach((p,i)=>{
    grid.innerHTML+=`
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <div class="price">$${p.price}</div>

        <a href="https://wa.me/56920521986?text=Hola%20quiero%20${p.name}">
          <button>Comprar por WhatsApp 💬</button>
        </a>
      </div>
    `;
  });

  localStorage.setItem("products", JSON.stringify(products));
}

/* ADMIN */
function openAdmin(){
  document.getElementById("adminPanel").style.display="block";
  renderAdmin();
}

function closeAdmin(){
  document.getElementById("adminPanel").style.display="none";
}

/* LOGIN */
function login(){
  if(user.value==="admin" && pass.value==="1234"){
    isAdmin=true;
    alert("Bienvenido 🔥");
  }else{
    alert("Error login");
  }
}

/* AGREGAR */
function add(){
  if(!isAdmin)return alert("No autorizado");

  products.push({
    name:name.value,
    price:price.value,
    img:img.value,
    desc:desc.value
  });

  render();
  renderAdmin();
}

/* BORRAR */
function del(i){
  products.splice(i,1);
  render();
  renderAdmin();
}

/* PANEL */
function renderAdmin(){
  let list=document.getElementById("list");
  list.innerHTML="";

  products.forEach((p,i)=>{
    list.innerHTML+=`
      <div class="adminCard">
        ${p.name} - $${p.price}
        <button onclick="del(${i})">Eliminar</button>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
