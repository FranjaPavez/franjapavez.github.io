<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Florería Lirios de Oro</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #7a0c0c;
  color: #fff;
}

/* NAV */
nav {
  background: #5a0000;
  padding: 15px;
  text-align: center;
}

nav a {
  color: gold;
  margin: 10px;
  text-decoration: none;
  font-size: 14px;
}

/* LOGO */
.logo {
  text-align: center;
  padding: 30px;
}

.logo img {
  width: 260px;
  border-radius: 50%;
  box-shadow: 0 0 30px rgba(255,215,0,0.4);
}

/* HEADER */
header {
  text-align: center;
  padding: 30px;
  animation: fadeIn 1.5s ease;
}

header h1 {
  font-size: 35px;
  color: gold;
}

/* BOTONES */
.btn {
  background: gold;
  color: black;
  padding: 12px 20px;
  border-radius: 30px;
  text-decoration: none;
  margin: 10px;
  display: inline-block;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: #8b0000;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.card h3, .card p {
  margin: 10px;
}

.buy {
  display: block;
  background: gold;
  color: black;
  padding: 10px;
  text-align: center;
  text-decoration: none;
}

/* SECCIONES */
section {
  text-align: center;
}

h2 {
  color: gold;
}

/* FOOTER */
footer {
  background: #3a0000;
  padding: 20px;
}

/* ANIMACIÓN */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<nav>
  <a href="#condolencias">Condolencias</a>
  <a href="#peluches">Peluches</a>
  <a href="#matrimonio">Matrimonio</a>
  <a href="#aniversario">Aniversario</a>
  <a href="#graduacion">Graduación</a>
  <a href="#contacto">Contacto</a>
</nav>

<div class="logo">
  <img src="logo.png">
</div>

<header>
  <h1>Florería Lirios de Oro</h1>
  <p>Elegancia en cada detalle 💐</p>

  <a class="btn" href="https://wa.me/56920521986">WhatsApp</a>
  <a class="btn" href="https://www.instagram.com/floreria.lirios.de.oro">Instagram</a>
</header>

<section id="condolencias">
<h2>Condolencias</h2>
<div class="grid">

<div class="card">
<img src="foto1.jpg">
<h3>Arreglo Elegante</h3>
<p>$30.000</p>
<a class="buy" href="https://wa.me/56920521986?text=Hola%20quiero%20este%20arreglo">Comprar</a>
</div>

</div>
</section>

<section id="contacto">
<h2>Ubicación</h2>
<p>Carelmapu 2523, Pedro Aguirre Cerda</p>

<iframe 
src="https://www.google.com/maps?q=Carelmapu+2523+Pedro+Aguirre+Cerda+Chile&output=embed"
width="90%" height="300"></iframe>

</section>

<footer>
<p>Florería Lirios de Oro © 2026</p>
</footer>

</body>
</html>
